<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="hero-panel">
            <p class="eyebrow">Welcome back</p>
            <h1>You are signed in</h1>
            <p class="hero-copy">Hello, {{ username }}. This dashboard is protected and only visible after login.</p>
        </section>

        <section class="card">
            <h2>Dashboard</h2>
            <p class="card-copy">You successfully logged into the Flask app.</p>
            <a class="link-button" href="{{ url_for('logout') }}">Logout</a>
        </section>
    </main>
</body>
</html>
